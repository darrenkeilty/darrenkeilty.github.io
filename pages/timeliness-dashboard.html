<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="../assets/DK_Monogram_Icon.png">
  <link rel="shortcut icon" type="image/png" href="../assets/DK_Monogram_Icon.png">
  <link rel="apple-touch-icon" href="../assets/DK_Monogram_Icon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commute Dashboard - Darren Keilty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c1217;
      --surface: #111a22;
      --surface-raised: #162029;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(156,180,192,0.35);
      --text: #dde8ef;
      --muted: #6b8a9a;
      --accent: #8fb4c4;
      --page-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.35);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(143,180,196,0.07) 0%, transparent 60%);
      color: var(--text);
      font-family: "Poppins", sans-serif;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 36px 0 64px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 40px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .back-link svg {
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .back-link:hover svg {
      transform: translateX(-3px);
    }

    .doc-title {
      font-size: clamp(1.25rem, 3vw, 2rem);
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 38px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-raised);
      color: var(--muted);
      text-decoration: none;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .btn:hover {
      color: var(--text);
      border-color: var(--border-hover);
    }

    .dashboard-container {
      width: 100%;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--page-shadow);
    }

    .tableauPlaceholder {
      position: relative;
      width: 100%;
      min-height: 1300px;
      background: #111;
    }

    .tableauViz {
      width: 100%;
      height: 100%;
    }

    @media (max-width: 1024px) {
      .tableauPlaceholder {
        min-height: 1120px;
      }
    }

    @media (max-width: 768px) {
      .shell {
        width: calc(100% - 24px);
        padding: 24px 0 48px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 28px;
      }

      .header-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .header-actions .btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="header">
      <div class="header-left">
        <a href="timeliness-project.html" class="back-link">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 2L4 7l5 5"/>
          </svg>
          <span>Back to Project Page</span>
        </a>
        <h1 class="doc-title">Commute Dashboard</h1>
      </div>
      <div class="header-actions">
        <a href="timeliness-project.html" class="btn">Back</a>
        <a href="https://public.tableau.com/views/CPSC482-Project_17653313200860/Dashboard3?:showVizHome=no" class="btn" target="_blank" rel="noopener noreferrer">Open in Tableau Public</a>
      </div>
    </header>

    <div class="dashboard-container">
      <div class="tableauPlaceholder" id="tableau-dashboard">
        <noscript>
          <a href="https://public.tableau.com/views/CPSC482-Project_17653313200860/Dashboard3?:showVizHome=no">
            <img
              alt="Commute Dashboard"
              src="https://public.tableau.com/static/images/CP/CPSC482-Project_17653313200860/Dashboard3/1_rss.png"
              style="border: none; width: 100%; height: auto;"
            >
          </a>
        </noscript>
        <object class="tableauViz" style="display:none;">
          <param name="host_url" value="https%3A%2F%2Fpublic.tableau.com%2F" />
          <param name="embed_code_version" value="3" />
          <param name="site_root" value="" />
          <param name="name" value="CPSC482-Project_17653313200860/Dashboard3" />
          <param name="tabs" value="no" />
          <param name="toolbar" value="yes" />
          <param name="static_image" value="https://public.tableau.com/static/images/CP/CPSC482-Project_17653313200860/Dashboard3/1.png" />
          <param name="animate_transition" value="yes" />
          <param name="display_static_image" value="yes" />
          <param name="display_spinner" value="yes" />
          <param name="display_overlay" value="yes" />
          <param name="display_count" value="yes" />
          <param name="language" value="en-US" />
          <param name="filter" value="publish=yes" />
        </object>
      </div>
    </div>
  </main>

  <script type="text/javascript">
    function getDashboardHeight(width) {
      if (width >= 1200) {
        return 1320;
      }

      if (width >= 992) {
        return 1240;
      }

      if (width >= 768) {
        return 1120;
      }

      if (width >= 480) {
        return 1020;
      }

      return 920;
    }

    function applyDesktopSizing() {
      const placeholder = document.getElementById("tableau-dashboard");
      const vizElement = placeholder.getElementsByTagName("object")[0];
      const width = placeholder.offsetWidth;
      const height = getDashboardHeight(width);

      placeholder.style.minHeight = height + "px";
      vizElement.style.width = "100%";
      vizElement.style.height = height + "px";
    }

    function initTableau() {
      const divElement = document.getElementById("tableau-dashboard");
      const vizElement = divElement.getElementsByTagName("object")[0];

      applyDesktopSizing();

      const scriptElement = document.createElement("script");
      scriptElement.src = "https://public.tableau.com/javascripts/api/viz_v1.js";
      vizElement.parentNode.insertBefore(scriptElement, vizElement);
    }

    window.addEventListener("load", initTableau);

    let resizeTimer;
    window.addEventListener("resize", function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function () {
        applyDesktopSizing();
      }, 150);
    });
  </script>
</body>
</html>
