<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="../assets/DK_Monogram_Icon.png">
  <link rel="shortcut icon" type="image/png" href="../assets/DK_Monogram_Icon.png">
  <link rel="apple-touch-icon" href="../assets/DK_Monogram_Icon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>PDF Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg:             #0c1217;
      --surface:        #111a22;
      --surface-raised: #162029;
      --border:         rgba(255,255,255,0.07);
      --border-hover:   rgba(156,180,192,0.35);
      --text:           #dde8ef;
      --muted:          #6b8a9a;
      --accent:         #8fb4c4;
      --page-shadow:    0 24px 64px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(143,180,196,0.07) 0%, transparent 60%);
      color: var(--text);
      font-family: "Poppins", sans-serif;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shell ─────────────────────────────────────────── */
    .shell {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 36px 0 64px;
    }

    /* ── Header ────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 40px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .back-link svg {
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .back-link:hover { color: var(--accent); }
    .back-link:hover svg { transform: translateX(-3px); }

    .doc-title {
      font-size: clamp(1.25rem, 3vw, 2rem);
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    /* ── Buttons ───────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 38px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface-raised);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      white-space: nowrap;
      user-select: none;
    }

    .btn:hover {
      color: var(--text);
      border-color: var(--border-hover);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn:disabled:hover {
      color: var(--muted);
      border-color: var(--border);
    }

    .btn-primary {
      background: var(--accent);
      color: #0c1217;
      border-color: transparent;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #a8cad8;
      color: #0c1217;
      border-color: transparent;
    }

    /* ── Toolbar ───────────────────────────────────────── */
    .zoom-track {
      display: inline-flex;
      align-items: center;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      overflow: hidden;
    }

    .zoom-track .btn {
      height: 100%;
      width: 38px;
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      font-size: 1.1rem;
    }

    .zoom-track .btn:first-child { border-right: 1px solid var(--border); }
    .zoom-track .btn:last-child  { border-left:  1px solid var(--border); }

    .zoom-value {
      min-width: 56px;
      text-align: center;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--accent);
      cursor: default;
      padding: 0 2px;
      user-select: none;
    }

    /* ── Error ─────────────────────────────────────────── */
    .error {
      display: none;
      margin-bottom: 24px;
      padding: 14px 18px;
      border-radius: 10px;
      background: rgba(255,80,80,0.07);
      border: 1px solid rgba(255,80,80,0.2);
      color: #ffb3b3;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* ── Viewer ────────────────────────────────────────── */
    .viewer-scale { transform-origin: top center; }

    .viewer {
      display: grid;
      gap: 20px;
      justify-items: center;
      width: min(860px, 100%);
      margin: 0 auto;
    }

    /* ── Page ──────────────────────────────────────────── */
    .page-wrap {
      position: relative;
      width: 100%;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: var(--page-shadow);
    }

    .page-placeholder {
      display: grid;
      place-items: center;
      width: 100%;
      aspect-ratio: var(--pw) / var(--ph);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .page-wrap canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    .page-num {
      position: absolute;
      right: 12px;
      bottom: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(12,18,23,0.72);
      color: var(--muted);
      font-family: monospace;
      font-size: 0.75rem;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 640px) {
      .shell {
        width: calc(100% - 24px);
        padding: 24px 0 48px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 28px;
      }

      .header-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .header-actions .btn {
        flex: 1;
      }

      .zoom-track { order: -1; }

      .doc-title { font-size: 1.35rem; }
    }
  </style>
</head>
<body>
  <main class="shell">

    <header class="header">
      <div class="header-left">
        <a id="back-link" class="back-link" href="/">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 2L4 7l5 5"/>
          </svg>
          <span id="back-label">Back</span>
        </a>
        <h1 id="viewer-title" class="doc-title">PDF Viewer</h1>
      </div>
      <div class="header-actions">
        <div class="zoom-track">
          <button id="zoom-out" class="btn" type="button" aria-label="Zoom out">−</button>
          <button id="zoom-reset" type="button" aria-label="Reset zoom" style="background:none;border:none;cursor:pointer;">
            <span id="zoom-display" class="zoom-value">100%</span>
          </button>
          <button id="zoom-in" class="btn" type="button" aria-label="Zoom in">+</button>
        </div>
        <a id="open-link" class="btn" href="#" target="_blank" rel="noopener noreferrer">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 2H3a1 1 0 00-1 1v8a1 1 0 001 1h8a1 1 0 001-1V9"/>
            <path d="M8 2h4v4"/>
            <path d="M14 1L7 8"/>
          </svg>
          Open
        </a>
        <a id="download-link" class="btn btn-primary" href="#" download>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 2v7M4 7l3 3 3-3"/>
            <path d="M2 11h10"/>
          </svg>
          Download
        </a>
      </div>
    </header>

    <div id="error" class="error"></div>
    <div id="viewer-scale" class="viewer-scale">
      <section id="viewer" class="viewer" aria-live="polite"></section>
    </div>
  </main>

  <script>
    (() => {
      const params    = new URLSearchParams(window.location.search);
      const file      = params.get("file");
      const title     = params.get("title") || "PDF Viewer";
      const back      = params.get("back") || "/";
      const backLabel = params.get("backLabel") || "Back";

      document.getElementById("viewer-title").textContent = title;
      document.title = title + " — Darren Keilty";

      const backLink = document.getElementById("back-link");
      backLink.href = back;
      document.getElementById("back-label").textContent = backLabel;

      if (!file) {
        const errorEl = document.getElementById("error");
        errorEl.textContent = "Missing PDF file parameter.";
        errorEl.style.display = "block";
        window.viewerConfig = null;
        return;
      }

      const resolvedFile = new URL(file, window.location.href).toString();
      document.getElementById("open-link").href = resolvedFile;
      document.getElementById("download-link").href = resolvedFile;
      window.viewerConfig = { resolvedFile };
    })();
  </script>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/build/pdf.min.mjs";
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/build/pdf.worker.min.mjs";

    const config = window.viewerConfig;
    if (!config) throw new Error("Missing viewer configuration");

    const errorEl     = document.getElementById("error");
    const viewerEl    = document.getElementById("viewer");
    const viewerScale = document.getElementById("viewer-scale");
    const zoomOut     = document.getElementById("zoom-out");
    const zoomIn      = document.getElementById("zoom-in");
    const zoomReset   = document.getElementById("zoom-reset");
    const zoomDisp    = document.getElementById("zoom-display");

    const DEFAULT_ZOOM = 1.0;
    const MIN_ZOOM     = 0.4;
    const MAX_ZOOM     = 1.5;
    const ZOOM_STEP    = 0.1;

    const pageState = new Map();
    let pdfDoc      = null;
    let observer    = null;
    let resizeTimer = null;
    let renderToken = 0;
    let zoom        = DEFAULT_ZOOM;

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = "block";
    }

    function clamp(v) {
      return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, parseFloat(v.toFixed(2))));
    }

    function syncZoomUI() {
      viewerScale.style.zoom = String(zoom);
      zoomDisp.textContent = `${Math.round(zoom * 100)}%`;
      zoomOut.disabled = zoom <= MIN_ZOOM;
      zoomIn.disabled  = zoom >= MAX_ZOOM;
    }

    async function buildShells() {
      for (let n = 1; n <= pdfDoc.numPages; n++) {
        const page = await pdfDoc.getPage(n);
        const vp   = page.getViewport({ scale: 1 });

        const wrap = document.createElement("article");
        wrap.className = "page-wrap";
        wrap.dataset.page = String(n);
        wrap.style.setProperty("--pw", vp.width);
        wrap.style.setProperty("--ph", vp.height);

        const ph = document.createElement("div");
        ph.className = "page-placeholder";
        ph.textContent = `Page ${n}`;

        const label = document.createElement("div");
        label.className = "page-num";
        label.textContent = `${n} / ${pdfDoc.numPages}`;

        wrap.appendChild(ph);
        wrap.appendChild(label);
        viewerEl.appendChild(wrap);

        pageState.set(n, { w: vp.width, renderedW: 0, busy: false, done: false });
        observer.observe(wrap);
      }
    }

    async function renderPage(wrap) {
      const n = Number(wrap.dataset.page);
      const s = pageState.get(n);
      if (!s || s.busy) return;

      const targetW = Math.max(Math.floor(wrap.clientWidth), 1);
      if (s.done && Math.abs(targetW - s.renderedW) < 4) return;

      const token = renderToken;
      s.busy = true;

      const ph = wrap.querySelector(".page-placeholder");
      if (ph) ph.textContent = "Loading…";

      try {
        const page  = await pdfDoc.getPage(n);
        const scale = targetW / s.w;
        const vp    = page.getViewport({ scale });
        const dpr   = window.devicePixelRatio || 1;

        let canvas = wrap.querySelector("canvas");
        if (!canvas) {
          canvas = document.createElement("canvas");
          wrap.prepend(canvas);
        }

        const ctx = canvas.getContext("2d", { alpha: false });
        canvas.width  = Math.floor(vp.width  * dpr);
        canvas.height = Math.floor(vp.height * dpr);
        canvas.style.width  = `${Math.floor(vp.width)}px`;
        canvas.style.height = `${Math.floor(vp.height)}px`;

        await page.render({
          canvasContext: ctx,
          viewport: vp,
          transform: dpr === 1 ? null : [dpr, 0, 0, dpr, 0, 0]
        }).promise;

        if (token !== renderToken) return;

        wrap.querySelector(".page-placeholder")?.remove();
        s.done = true;
        s.renderedW = targetW;
      } catch (e) {
        console.error(e);
        showError("Render failed — use Open or Download as a fallback.");
      } finally {
        s.busy = false;
      }
    }

    function rerender() {
      renderToken++;
      document.querySelectorAll(".page-wrap").forEach(wrap => {
        const s = pageState.get(Number(wrap.dataset.page));
        if (!s) return;
        s.done = false;
        s.renderedW = 0;
        wrap.querySelector("canvas")?.remove();
        if (!wrap.querySelector(".page-placeholder")) {
          const ph = document.createElement("div");
          ph.className = "page-placeholder";
          ph.textContent = `Page ${wrap.dataset.page}`;
          wrap.prepend(ph);
        }
      });

      document.querySelectorAll(".page-wrap").forEach(wrap => {
        const r = wrap.getBoundingClientRect();
        if (r.top < window.innerHeight * 1.5 && r.bottom > -window.innerHeight * 0.5) {
          renderPage(wrap);
        }
      });
    }

    observer = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) renderPage(e.target); }),
      { rootMargin: "600px 0px" }
    );

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(rerender, 200);
    });

    zoomOut.addEventListener("click", () => {
      const z = clamp(zoom - ZOOM_STEP);
      if (z !== zoom) { zoom = z; syncZoomUI(); }
    });

    zoomIn.addEventListener("click", () => {
      const z = clamp(zoom + ZOOM_STEP);
      if (z !== zoom) { zoom = z; syncZoomUI(); }
    });

    zoomReset.addEventListener("click", () => {
      if (zoom !== DEFAULT_ZOOM) { zoom = DEFAULT_ZOOM; syncZoomUI(); }
    });

    try {
      syncZoomUI();
      pdfDoc = await pdfjsLib.getDocument(config.resolvedFile).promise;
      await buildShells();
    } catch (e) {
      console.error(e);
      showError("Could not load the PDF. Use Open or Download as a fallback.");
    }
  </script>
</body>
</html>
