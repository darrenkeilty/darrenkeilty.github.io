<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>PDF Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10161c;
      --panel: #17212a;
      --panel-border: #2f4658;
      --text: #e5edf3;
      --muted: #9db1c0;
      --accent: #9cb4c0;
      --accent-strong: #d4e3eb;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(156, 180, 192, 0.15), transparent 34%),
        linear-gradient(180deg, #0f171d 0%, #10161c 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .shell {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      padding: 16px 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      background: rgba(23, 33, 42, 0.9);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .title-block h1 {
      margin: 0;
      font-size: clamp(1.4rem, 3.3vw, 2.3rem);
      color: var(--accent-strong);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: var(--accent);
      color: #0f171d;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      background: var(--accent-strong);
    }

    .button.secondary {
      background: transparent;
      color: var(--accent);
      border-color: var(--panel-border);
    }

    .button.secondary:hover {
      border-color: var(--accent);
      background: rgba(156, 180, 192, 0.08);
    }

    .error {
      margin-bottom: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(23, 33, 42, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow);
      line-height: 1.5;
    }

    .error {
      display: none;
      border-color: rgba(255, 133, 133, 0.45);
      color: #ffd3d3;
    }

    .viewer {
      display: grid;
      gap: 24px;
      justify-items: center;
    }

    .page-shell {
      position: relative;
      width: min(100%, 920px);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(135deg, rgba(156, 180, 192, 0.08), rgba(255, 255, 255, 0.02)),
        var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .page-placeholder {
      display: grid;
      place-items: center;
      width: 100%;
      aspect-ratio: var(--page-width) / var(--page-height);
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    .page-shell canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    .page-label {
      position: absolute;
      right: 14px;
      bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(16, 22, 28, 0.75);
      color: #d9e5ec;
      font-size: 0.83rem;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 768px) {
      .shell {
        width: min(100% - 20px, 1200px);
        padding-top: 14px;
      }

      .topbar {
        padding: 14px;
        border-radius: 14px;
      }

      .actions {
        width: 100%;
      }

      .button {
        flex: 1 1 160px;
      }

      .viewer {
        gap: 16px;
      }

      .page-shell {
        width: 100%;
        border-radius: 12px;
      }
    }

    @media (max-width: 480px) {
      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div class="title-block">
        <h1 id="viewer-title">PDF Viewer</h1>
      </div>
      <div class="actions">
        <a id="back-link" class="button secondary" href="../index.html">Back</a>
        <a id="open-link" class="button secondary" href="#" target="_blank" rel="noopener noreferrer">Open PDF</a>
        <a id="download-link" class="button" href="#" download>Download PDF</a>
      </div>
    </section>

    <div id="error" class="error"></div>
    <section id="viewer" class="viewer" aria-live="polite"></section>
  </main>

  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      const title = params.get("title") || "PDF Viewer";
      const back = params.get("back") || "../index.html";
      const backLabel = params.get("backLabel") || "Back";

      const titleEl = document.getElementById("viewer-title");
      const backLink = document.getElementById("back-link");
      const openLink = document.getElementById("open-link");
      const downloadLink = document.getElementById("download-link");
      const errorEl = document.getElementById("error");

      titleEl.textContent = title;
      document.title = title + " - Darren Keilty";
      backLink.href = back;
      backLink.textContent = backLabel;

      if (!file) {
        errorEl.textContent = "Missing PDF file parameter.";
        errorEl.style.display = "block";
        window.viewerConfig = null;
        return;
      }

      const resolvedFile = new URL(file, window.location.href).toString();
      openLink.href = resolvedFile;
      downloadLink.href = resolvedFile;
      window.viewerConfig = { file, resolvedFile, title, back, backLabel };
    })();
  </script>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/build/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.6.205/build/pdf.worker.min.mjs";

    const config = window.viewerConfig;
    if (!config) {
      throw new Error("Missing viewer configuration");
    }

    const titleEl = document.getElementById("viewer-title");
    const errorEl = document.getElementById("error");
    const viewerEl = document.getElementById("viewer");

    titleEl.textContent = config.title;
    document.title = config.title + " - Darren Keilty";
    const resolvedFile = config.resolvedFile;

    const pageState = new Map();
    let pdfDocument = null;
    let intersectionObserver = null;
    let resizeTimer = null;
    let currentRenderToken = 0;

    function showError(message) {
      errorEl.textContent = message;
      errorEl.style.display = "block";
    }

    async function buildPageShells() {
      for (let pageNumber = 1; pageNumber <= pdfDocument.numPages; pageNumber += 1) {
        const page = await pdfDocument.getPage(pageNumber);
        const baseViewport = page.getViewport({ scale: 1 });

        const shell = document.createElement("article");
        shell.className = "page-shell";
        shell.dataset.pageNumber = String(pageNumber);
        shell.style.setProperty("--page-width", baseViewport.width);
        shell.style.setProperty("--page-height", baseViewport.height);

        const placeholder = document.createElement("div");
        placeholder.className = "page-placeholder";
        placeholder.textContent = `Page ${pageNumber}`;

        const label = document.createElement("div");
        label.className = "page-label";
        label.textContent = `Page ${pageNumber} of ${pdfDocument.numPages}`;

        shell.appendChild(placeholder);
        shell.appendChild(label);
        viewerEl.appendChild(shell);

        pageState.set(pageNumber, {
          width: baseViewport.width,
          height: baseViewport.height,
          renderedWidth: 0,
          rendering: false,
          rendered: false
        });

        intersectionObserver.observe(shell);
      }
    }

    async function renderPage(shell) {
      const pageNumber = Number(shell.dataset.pageNumber);
      const state = pageState.get(pageNumber);
      if (!state || state.rendering) {
        return;
      }

      const targetWidth = Math.max(Math.floor(shell.clientWidth), 1);
      if (state.rendered && Math.abs(targetWidth - state.renderedWidth) < 4) {
        return;
      }

      const renderToken = currentRenderToken;
      state.rendering = true;
      shell.querySelector(".page-placeholder").textContent = `Rendering page ${pageNumber}...`;

      try {
        const page = await pdfDocument.getPage(pageNumber);
        const scale = targetWidth / state.width;
        const viewport = page.getViewport({ scale });
        const outputScale = window.devicePixelRatio || 1;

        const canvas = shell.querySelector("canvas") || document.createElement("canvas");
        const context = canvas.getContext("2d", { alpha: false });

        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = `${Math.floor(viewport.width)}px`;
        canvas.style.height = `${Math.floor(viewport.height)}px`;

        if (!canvas.isConnected) {
          shell.prepend(canvas);
        }

        const renderContext = {
          canvasContext: context,
          viewport,
          transform: outputScale === 1 ? null : [outputScale, 0, 0, outputScale, 0, 0]
        };

        await page.render(renderContext).promise;

        if (renderToken !== currentRenderToken) {
          return;
        }

        const placeholder = shell.querySelector(".page-placeholder");
        if (placeholder) {
          placeholder.remove();
        }

        state.rendered = true;
        state.renderedWidth = targetWidth;
      } catch (error) {
        console.error(error);
        showError("The PDF could not be rendered. Use Open PDF or Download PDF as a fallback.");
      } finally {
        state.rendering = false;
      }
    }

    function rerenderVisiblePages() {
      currentRenderToken += 1;
      document.querySelectorAll(".page-shell").forEach((shell) => {
        const state = pageState.get(Number(shell.dataset.pageNumber));
        if (!state) {
          return;
        }
        state.rendered = false;
        state.renderedWidth = 0;
        const existingCanvas = shell.querySelector("canvas");
        if (existingCanvas) {
          existingCanvas.remove();
        }
        if (!shell.querySelector(".page-placeholder")) {
          const placeholder = document.createElement("div");
          placeholder.className = "page-placeholder";
          placeholder.textContent = `Page ${shell.dataset.pageNumber}`;
          shell.prepend(placeholder);
        }
      });

      document.querySelectorAll(".page-shell").forEach((shell) => {
        const rect = shell.getBoundingClientRect();
        if (rect.top < window.innerHeight * 1.5 && rect.bottom > -window.innerHeight * 0.5) {
          renderPage(shell);
        }
      });
    }

    intersectionObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          renderPage(entry.target);
        }
      });
    }, {
      rootMargin: "600px 0px"
    });

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        rerenderVisiblePages();
      }, 180);
    });

    try {
      pdfDocument = await pdfjsLib.getDocument(resolvedFile).promise;
      await buildPageShells();
    } catch (error) {
      console.error(error);
      showError("The PDF viewer could not load this file. Use Open PDF or Download PDF as a fallback.");
    }
  </script>
</body>
</html>
